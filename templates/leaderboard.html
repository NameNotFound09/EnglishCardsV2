<!DOCTYPE html>
<html lang="ru" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Лидеры обучения</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
    <link rel="stylesheet" href="https://jsdelivr.net">
    <style>
        body {
            background-color: #121212;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            margin: 0;
        }
        .leader-card {
            width: 100%;
            max-width: 500px;
            border-radius: 15px;
            background-color: #1e1e1e;
            border: 1px solid #333;
        }
        .user-row {
            background-color: #2b2b2b;
            border-radius: 10px;
            margin-bottom: 10px;
            padding: 12px;
            border: 1px solid #444;
            transition: transform 0.2s;
        }
        .user-row:hover { transform: scale(1.02); border-color: #198754; }
        .gold { color: #ffd700; }
        .silver { color: #c0c0c0; }
        .bronze { color: #cd7f32; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 d-flex justify-content-center">

            <div class="card leader-card shadow-lg">
                <div class="card-body p-4">
    <!-- Заголовок и Кнопка Назад -->
                    <div class="text-center mb-4">
                        <h2 class="mb-3"><i class="bi bi-trophy-fill text-warning me-2"></i>Рейтинг</h2>
                        <a href="/main" class="btn btn-outline-secondary btn-sm px-4">
                            <i class="bi bi-arrow-left me-1"></i> Назад в меню
                        </a>
                    </div>

    <!-- ШАПКА ТАБЛИЦЫ (Заголовки в одну строку) -->
                    <div class="row g-0 px-3 mb-2 text-muted small fw-bold text-uppercase text-center">
                        <div class="col-2">#</div>
                        <div class="col-6 text-start ps-3">Пользователь</div>
                        <div class="col-4">Результат</div>
                    </div>

    <!-- СПИСОК (Данные в таких же колонках) -->
                    <div class="leader-list">
                        {% for user in users %}
                        <div class="user-row row g-0 align-items-center text-center shadow-sm mb-2"
                             style="background: #2b2b2b; border-radius: 10px; padding: 10px 0; border: 1px solid #444;">

            <!-- Место -->
                            <div class="col-2 fw-bold">
                                {% if loop.index == 1 %}<i class="bi bi-star-fill gold"></i>
                                {% elif loop.index == 2 %}<i class="bi bi-star-fill silver"></i>
                                {% elif loop.index == 3 %}<i class="bi bi-star-fill bronze"></i>
                                {% else %}{{ loop.index }}{% endif %}
                            </div>

            <!-- Имя (выровнено по левому краю для красоты) -->
                            <div class="col-6 text-start ps-3 text-truncate">
                                {{ user.login }}
                            </div>

            <!-- Очки -->
                            <div class="col-4 text-success fw-bold">
                                {{ user.score }} <small class="text-muted" style="font-size: 0.7rem;">PTS</small>
                            </div>
                        </div>
                        {% endfor %}
                    </div>

                    {% if not users %}
                    <p class="text-center text-muted mt-3">Рейтинг пока пуст</p>
                    {% endif %}
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://jsdelivr.net"></script>
</body>
</html>
